name: Build debug APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log
        continue-on-error: true
        id: build_step

      - name: Commit build log on failure
        if: steps.build_step.outcome == 'failure'
        run: |
          git config user.email "bot@local"
          git config user.name "CI Bot"
          git add -f build-output.log
          git commit -m "CI build log (failed run ${{ github.run_number }})"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail job if build failed
        if: steps.build_step.outcome == 'failure'
        run: exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: tone-rewriter-keyboard-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK as a release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Debug APK build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
